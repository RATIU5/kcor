version: "3.8"

services:
  next:
    container_name: next
    build:
      context: ./next
      dockerfile: Dockerfile
      target: dev
    env_file: .env
    environment:
      NODE_ENV: development
      BIGCOMMERCE_CANONICAL_STORE_DOMAIN: ${BIGCOMMERCE_CANONICAL_STORE_DOMAIN}
      BIGCOMMERCE_API_URL: ${BIGCOMMERCE_API_URL}
      BIGCOMMERCE_CDN_HOSTNAME: ${BIGCOMMERCE_CDN_HOSTNAME}
      COMPANY_NAME: ${COMPANY_NAME}
      SITE_NAME: ${SITE_NAME}
      BIGCOMMERCE_STORE_HASH: ${BIGCOMMERCE_STORE_HASH}
      BIGCOMMERCE_CHANNEL_ID: ${BIGCOMMERCE_CHANNEL_ID}
      BIGCOMMERCE_ACCESS_TOKEN: ${BIGCOMMERCE_ACCESS_TOKEN}
      BIGCOMMERCE_CUSTOMER_IMPERSONATION_TOKEN: ${BIGCOMMERCE_CUSTOMER_IMPERSONATION_TOKEN}
      STRAPI_API_URL: ${STRAPI_API_URL}
      STRAPI_SECRET: ${STRAPI_SECRET}
      NEXT_PUBLIC_VERCEL_URL: ${NEXT_PUBLIC_VERCEL_URL}
      NEXT_PUBLIC_DEFAULT_REVALIDATE_TARGET: ${NEXT_PUBLIC_DEFAULT_REVALIDATE_TARGET}
    volumes:
      - ./next:/app
      - node_modules_next:/app/node_modules
    restart: always
    ports:
      - 3000:3000
    depends_on:
      - strapi
    networks:
      - postgresNet

  strapi:
    container_name: strapi
    build:
      context: ./strapi
      dockerfile: Dockerfile
    restart: unless-stopped
    hostname: strapiDB
    env_file: .env
    environment:
      DATABASE_CLIENT: ${DATABASE_CLIENT}
      DATABASE_HOST: strapiDB
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      APP_KEYS: ${APP_KEYS}
    ports:
      - '1337:1337'
    volumes:
      - ./strapi:/app
      - node_modules_strapi:/app/node_modules
    depends_on:
      - postgres
    networks:
      - postgresNet

  postgres:
    container_name: postgres
    platform: linux/amd64 #for platform error on Apple M1 chips
    restart: unless-stopped
    env_file: .env
    image: postgres:16-alpine
    hostname: postgresDB
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - strapi-data:/var/lib/postgresql/data/ #using a volume
      #- ./data:/var/lib/postgresql/data/ # if you want to use a bind folder
    ports:
      - "5432:5432"
    networks:
      - postgresNet

# https://stackoverflow.com/a/67010277
volumes:
  strapi-data:
  node_modules_next:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./next/node_modules
  node_modules_strapi:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./strapi/node_modules

networks:
  postgresNet:
    name: Strapi Postgres 
    driver: bridge